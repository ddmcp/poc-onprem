apiVersion: v1
kind: ConfigMap
metadata:
  name: services-config
  namespace: poc-onprem
data:
  # Database configuration
  DB_HOST: "pg-typing-pdf-extractor-db"
  DB_NAME: "pdfdb"
  DB_USER: "pdfuser"
  DB_PASS: "pdfpassword"
  
  # Qdrant configuration
  QDRANT_HOST: "qdrant-vector-db"
  QDRANT_PORT: "6333"
  
  # Ollama configuration
  OLLAMA_CHAT_MODEL: "tinyllama"
  OLLAMA_EMBEDDING_MODEL: "nomic-embed-text"
  OLLAMA_EMBEDDING_URL: "http://ollama-llm-embedding.poc-onprem:11434"
  
  # LLM Provider Configuration
  # Options: "ollama" or "openai-compatible"
  LLM_PROVIDER: "ollama"
  
  # OpenAI-Compatible Endpoint Configuration
  # Used when LLM_PROVIDER=openai-compatible
  # OPENAI_API_KEY is provided via openai-secrets Secret
  OPENAI_API_BASE_URL: "https://api.openai.com/v1"
  OPENAI_MODEL: "gpt-4"
  OPENAI_TEMPERATURE: "0"
  
  # Chat UI configuration
  # NOTE: needs to be your expected external route for chat-docs-service,
  # replace example.com with the right hostname for your cluster
  CHAT_API_URL: "http://chat-docs-service-poc-onprem.apps.example.com/ask_llm_model"

# Made with Bob
