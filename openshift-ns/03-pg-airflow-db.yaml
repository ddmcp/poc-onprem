apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pg-airflow-db-pvc
  namespace: poc-onprem-ns
  labels:
    app: pg-airflow-db
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-airflow-secrets
  namespace: poc-onprem-ns
type: Opaque
stringData:
  postgres-user: "airflow"
  postgres-password: "airflow"
  postgres-db: "airflow"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pg-airflow-db
  namespace: poc-onprem-ns
  labels:
    app: pg-airflow-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pg-airflow-db
  template:
    metadata:
      labels:
        app: pg-airflow-db
    spec:
      serviceAccountName: poc-onprem-sa
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-airflow-secrets
              key: postgres-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-airflow-secrets
              key: postgres-password
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-airflow-secrets
              key: postgres-db
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - airflow
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - airflow
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: pg-airflow-db-pvc

